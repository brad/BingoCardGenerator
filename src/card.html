<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Card</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/icon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
</head>
<body class="standalone-body">
    <h1 id="card-title" class="bingo-header">Bingo Card</h1>
    <div class="bingo-container">
        <div class="card-transition-container">
            <div id="bingo-grid" class="bingo-grid"></div>
        </div>
    </div>

    <footer class="multiplayer-footer">
        <button id="prev-player" class="nav-button" aria-label="Previous player">&lsaquo;</button>
        <div class="player-info">
            <div id="current-player-name" class="player-name">Loading...</div>
            <div id="player-count" class="player-status"></div>
        </div>
        <button id="next-player" class="nav-button" aria-label="Next player">&rsaquo;</button>
    </footer>

    <dialog id="nickname-modal">
        <div class="modal-content">
            <h3>Enter Nickname</h3>
            <p>Choose a name to join the game.</p>
            <input type="text" id="nickname-input" placeholder="Your nickname" maxlength="15">
            <div id="nickname-error" class="error-message"></div>
            <div class="modal-buttons">
                <button id="nickname-submit">Join Game</button>
            </div>
        </div>
    </dialog>

  <dialog id="note-modal">
        <div class="modal-content">
            <h3 id="modal-title">Square Note</h3>
            <textarea id="note-text" placeholder="Enter your note here..."></textarea>
            <div class="modal-buttons">
                <button type="button" class="cancel-btn" id="close-modal">Cancel</button>
                <button type="button" id="save-note">Save Note</button>
            </div>
        </div>
    </dialog>

    <script type="module">
        import { bingoCore } from './js/bingo-core.js';
        import { storage as bingoStorage } from './js/storage.js';
        import { sync } from './js/sync.js';

        const gridElement = document.getElementById('bingo-grid');
        const titleElement = document.getElementById('card-title');
        const nicknameModal = document.getElementById('nickname-modal');
        const nicknameInput = document.getElementById('nickname-input');
        const nicknameSubmit = document.getElementById('nickname-submit');
        const nicknameError = document.getElementById('nickname-error');
        const currentPlayerName = document.getElementById('current-player-name');
        const playerCount = document.getElementById('player-count');
        const prevBtn = document.getElementById('prev-player');
        const nextBtn = document.getElementById('next-player');
        const noteModal = document.getElementById('note-modal');
        const noteTextarea = document.getElementById('note-text');
        const saveNoteBtn = document.getElementById('save-note');
        const closeModalBtn = document.getElementById('close-modal');
        const modalTitle = document.getElementById('modal-title');

        let myCardData = null;
        let otherPlayers = [];
        let currentIndex = -1; // -1 means "Me"
        let userInfo = bingoStorage.getUserInfo();

        let currentSpaceIndex = -1;


        async function init() {
            // Priority 1: New config in URL
            const search = window.location.search;
            if (search && search.includes('c=')) {
                const config = bingoCore.decodeConfig(search);
                if (config && config.words) {
                    myCardData = bingoCore.generateCardData(config, config.raw);
                    bingoStorage.saveCard(myCardData);
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }

            if (!myCardData) {
                myCardData = bingoStorage.loadCard();
            }

            if (!myCardData) {
                myCardData = bingoCore.generateCardData(bingoCore.DEFAULT_CONFIG, 'default');
                bingoStorage.saveCard(myCardData);
            }

            // Ensure roomId is sanitized (for migration)
            if (myCardData && myCardData.roomId) {
                const sanitized = bingoCore.sanitizeRoomId(myCardData.roomId);
                if (sanitized !== myCardData.roomId) {
                    myCardData.roomId = sanitized;
                    bingoStorage.saveCard(myCardData);
                }
            }

            renderCard(myCardData);

            // Setup Multi-player
            if (!userInfo.nickname) {
                try {
                    const count = await sync.getPlayerCount(myCardData.roomId);
                    nicknameInput.value = `Player ${count + 1}`;
                } catch (e) {
                    console.error("Firebase might not be configured or room empty:", e);
                    nicknameInput.value = "Player 1";
                }
                nicknameModal.showModal();
            } else {
                joinRoom();
            }
        }

        async function joinRoom() {
            try {
                await sync.joinRoom(myCardData.roomId, userInfo, myCardData);
                sync.subscribeToRoom(myCardData.roomId, userInfo.id, (players) => {
                    otherPlayers = players;
                    updateNavigation();
                });
            } catch (e) {
                if (e.message === 'Nickname already taken') {
                    userInfo.nickname = '';
                    bingoStorage.setUserInfo(userInfo);
                    nicknameModal.showModal();
                    nicknameError.textContent = 'Nickname already taken. Please choose another.';
                } else {
                    console.error("Join room failed:", e);
                    // Still update navigation even if sync fails so UI doesn't hang
                    updateNavigation();
                }
            }
        }

        nicknameSubmit.addEventListener('click', async () => {
            const nick = nicknameInput.value.trim();
            if (nick) {
                nicknameSubmit.disabled = true;
                try {
                    const available = await sync.isNicknameAvailable(myCardData.roomId, nick);
                    if (available) {
                        userInfo.nickname = nick;
                        bingoStorage.setUserInfo(userInfo);
                        nicknameModal.close();
                        joinRoom();
                    } else {
                        nicknameError.textContent = 'Nickname already taken.';
                        nicknameSubmit.disabled = false;
                    }
                } catch (err) {
                    console.error("Firebase might not be configured:", err);
                    // If Firebase is not configured, we still want the UI to work locally
                    userInfo.nickname = nick;
                    bingoStorage.setUserInfo(userInfo);
                    nicknameModal.close();
                    updateNavigation();
                }
            }
        });

        function updateNavigation() {
            const total = otherPlayers.length + 1;
            const displayIndex = currentIndex === -1 ? 1 : currentIndex + 2;

            if (userInfo.nickname) {
                currentPlayerName.textContent = currentIndex === -1 ? `${userInfo.nickname} (You)` : otherPlayers[currentIndex].nickname;
            } else {
                currentPlayerName.textContent = "Guest";
            }

            playerCount.textContent = `Player ${displayIndex} of ${total}`;

            prevBtn.disabled = currentIndex <= -1;
            nextBtn.disabled = currentIndex >= otherPlayers.length - 1;
        }
      
        function openNoteModal(index) {
            currentSpaceIndex = index;
            const space = myCardData.spaces[index];
            modalTitle.textContent = `Note for "${space.text}"`;
            noteTextarea.value = space.note || "";
            noteModal.showModal();
        }

        saveNoteBtn.addEventListener('click', () => {
            if (currentSpaceIndex !== -1) {
                myCardData.spaces[currentSpaceIndex].note = noteTextarea.value;
                bingoStorage.saveCard(myCardData);
                sync.updateCard(myCardData.roomId, userInfo.id, myCardData);
                noteModal.close();
            }
        });

        closeModalBtn.addEventListener('click', () => {
            noteModal.close();
        });

        function renderCard(data, isReadOnly = false) {
            titleElement.textContent = data.title;
            document.body.className = `standalone-body font-${data.fontSize || 'm'}`;
            gridElement.style.gridTemplateColumns = `repeat(${data.width}, 1fr)`;
            gridElement.style.gridTemplateRows = `repeat(${data.height}, 1fr)`;
            gridElement.innerHTML = '';

            data.spaces.forEach((space, index) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell' + (space.marked ? ' marked' : '') + (isReadOnly ? ' readonly' : '');
                const text = document.createElement('div');
                text.textContent = space.text;
                cell.appendChild(text);

                if (space.subheading) {
                    const sub = document.createElement('div');
                    sub.className = 'freespace-label';
                    sub.textContent = space.subheading;
                    cell.appendChild(sub);
                }
                if (!isReadOnly) {
                    let pressTimer;
                    let isLongPress = false;

                    const startPress = () => {
                        isLongPress = false;
                        if (data.enableNotes && !space.isFreeSpace) {
                            pressTimer = setTimeout(() => {
                                isLongPress = true;
                                openNoteModal(index);
                            }, 500);
                        }
                    };

                    const cancelPress = () => {
                        clearTimeout(pressTimer);
                    };

                    cell.addEventListener('pointerdown', startPress);
                    cell.addEventListener('pointerup', cancelPress);
                    cell.addEventListener('pointermove', cancelPress);
                    cell.addEventListener('pointercancel', cancelPress);

                    cell.addEventListener('click', () => {
                        if (isLongPress) return;

                        const wasMarked = space.marked;
                        space.marked = !wasMarked;
                        cell.classList.toggle('marked');

                        if (!wasMarked) { // If we just daubed it
                            if (data.enableNotes && !space.isFreeSpace && !space.wasEverDaubed) {
                                space.wasEverDaubed = true;
                                openNoteModal(index);
                            }
                            space.wasEverDaubed = true;
                        }

                        bingoStorage.saveCard(myCardData);
                        sync.updateCard(myCardData.roomId, userInfo.id, myCardData);
                    });
                }

                gridElement.appendChild(cell);
            });
            updateNavigation();
        }

        async function switchPlayer(newIndex) {
            const direction = newIndex > currentIndex ? 'slide-left' : 'slide-right';
            gridElement.classList.add(direction);

            setTimeout(() => {
                currentIndex = newIndex;
                const data = currentIndex === -1 ? myCardData : otherPlayers[currentIndex].cardData;
                renderCard(data, currentIndex !== -1);

                gridElement.classList.remove('slide-left', 'slide-right');
                const opposite = direction === 'slide-left' ? 'slide-right' : 'slide-left';
                gridElement.classList.add(opposite);

                // Force reflow
                gridElement.offsetHeight;

                gridElement.classList.remove(opposite);
            }, 300);
        }

        prevBtn.addEventListener('click', () => {
            if (currentIndex > -1) switchPlayer(currentIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < otherPlayers.length - 1) switchPlayer(currentIndex + 1);
        });

        init();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
