<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Card</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/images/icon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
</head>
<body class="standalone-body">
    <div id="loading-overlay" class="loading-overlay visible">
        <div class="loading-spinner"></div>
    </div>

    <header class="bingo-header">
        <h1 id="card-title">Bingo</h1>
        <div class="header-right">
            <button id="help-btn" class="nav-button" aria-label="How to play">?</button>
        </div>
    </header>

    <div class="card-transition-container">
        <div id="bingo-grid" class="bingo-grid"></div>
    </div>

    <footer class="multiplayer-footer">
        <button id="prev-player" class="nav-button" aria-label="Previous player">&lsaquo;</button>
        <div class="player-info">
            <div id="current-player-name" class="player-name">Loading...</div>
            <div id="player-count" class="player-status"></div>
        </div>
        <button id="next-player" class="nav-button" aria-label="Next player">&rsaquo;</button>
    </footer>

    <dialog id="help-modal" class="bingo-modal">
        <div class="modal-content">
            <h2>How to Play</h2>
            <ul class="help-list">
                <li>Tap a cell to mark it.</li>
                <li>Long press a cell to add notes or photos.</li>
                <li>Long press your name at the bottom to change your nickname.</li>
                <li>In multiplayer, use arrows to see other players' progress.</li>
            </ul>
            <button id="close-help" class="btn btn-primary">Got it!</button>
        </div>
    </dialog>

    <dialog id="nickname-modal" class="bingo-modal">
        <div class="modal-content">
            <h2>Enter Nickname</h2>
            <p>Choose a name to join the room:</p>
            <input type="text" id="nickname-input" maxlength="20" placeholder="Your name">
            <div id="nickname-error" class="error-text"></div>
            <button id="nickname-submit" class="btn btn-primary">Join Room</button>
        </div>
    </dialog>

    <dialog id="note-modal" class="bingo-modal">
        <div class="modal-content">
            <h2 id="modal-title">Notes</h2>
            <div class="note-input-container">
                <textarea id="note-text" placeholder="Add a note..." maxlength="200"></textarea>
                <div id="photo-preview-container" class="photo-preview-container" style="display: none;">
                    <img id="photo-preview" src="" alt="Preview">
                    <button id="remove-photo-btn" class="remove-photo-btn" aria-label="Remove photo">&times;</button>
                </div>
                <div class="note-actions">
                    <button id="add-photo-btn" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        Add Photo
                    </button>
                    <input type="file" id="note-photo-input" accept="image/*" style="display: none;">
                </div>
            </div>
            <div class="modal-buttons">
                <button id="close-modal" class="btn btn-secondary">Close</button>
                <button id="save-note" class="btn btn-primary">Save</button>
            </div>
        </div>
    </dialog>

    <dialog id="photo-fullscreen-modal" class="photo-fullscreen-modal">
        <img id="fullscreen-photo" src="" alt="Fullscreen view">
    </dialog>

    <div id="toast-container" class="toast-container"></div>

    <script type="module">
        import { bingoCore } from './js/bingo-core.js';
        import { storage as bingoStorage } from './js/storage.js';
        import { sync } from './js/sync.js';

        const gridElement = document.getElementById('bingo-grid');
        const titleElement = document.getElementById('card-title');
        const nicknameModal = document.getElementById('nickname-modal');
        const nicknameInput = document.getElementById('nickname-input');
        const nicknameSubmit = document.getElementById('nickname-submit');
        const nicknameError = document.getElementById('nickname-error');
        const currentPlayerName = document.getElementById('current-player-name');
        const playerCount = document.getElementById('player-count');
        const prevBtn = document.getElementById('prev-player');
        const nextBtn = document.getElementById('next-player');
        const noteModal = document.getElementById('note-modal');
        const noteTextarea = document.getElementById('note-text');
        const saveNoteBtn = document.getElementById('save-note');
        const closeModalBtn = document.getElementById('close-modal');
        const modalTitle = document.getElementById('modal-title');
        const addPhotoBtn = document.getElementById('add-photo-btn');
        const notePhotoInput = document.getElementById('note-photo-input');
        const photoPreviewContainer = document.getElementById('photo-preview-container');
        const photoPreviewImg = document.getElementById('photo-preview');
        const removePhotoBtn = document.getElementById('remove-photo-btn');
        const photoFullscreenModal = document.getElementById('photo-fullscreen-modal');
        const fullscreenPhotoImg = document.getElementById('fullscreen-photo');
        const helpBtn = document.getElementById('help-btn');
        const helpModal = document.getElementById('help-modal');
        const closeHelpBtn = document.getElementById('close-help');

        let currentPhotoBase64 = "";
        let myCardData = null;
        let otherPlayers = [];
        let currentIndex = -1; // -1 means "Me"
        let userInfo = null;
        let isStandalone = false;
        let activeNickname = "";

        let currentSpaceIndex = -1;

        function showToast(message) {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = message;
            container.appendChild(toast);

            // Force reflow to trigger entrance animation
            toast.offsetHeight;
            toast.classList.add("visible");

            setTimeout(() => {
                toast.classList.remove("visible");
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        async function setupMultiplayer() {
            if (!userInfo.nickname) {
                try {
                    const count = await sync.getPlayerCount(myCardData.roomId);
                    nicknameInput.value = `Player ${count + 1}`;
                } catch (e) {
                    console.error("Firebase might not be configured or room empty:", e);
                    nicknameInput.value = "Player 1";
                }
                nicknameSubmit.textContent = "Join Room";
                nicknameModal.showModal();
            } else {
                joinRoom();
            }

            sync.subscribeToRoom(myCardData.roomId, userInfo.id, (players) => {
                otherPlayers = players;
                updateNavigation();
            });
        }

        async function init() {
            try {
                const params = new URLSearchParams(window.location.search);
                let roomIdParam = params.get('room');
                let configParam = params.get('c');
                const userIdParam = params.get('u');

                userInfo = bingoStorage.getUserInfo(roomIdParam);

                // Identity adoption: if we have a u= parameter, adopt that ID.
                // This helps PWA restoration on iOS where localStorage might be isolated or cleared.
                if (userIdParam && userInfo.id !== userIdParam) {
                    userInfo.id = userIdParam;
                    // If we're adopting a new ID, we should clear the local nickname for this room
                    // to ensure we fetch the correct one from Firestore or prompt the user.
                    if (roomIdParam) {
                        userInfo.nickname = '';
                        if (userInfo.nicknames) delete userInfo.nicknames[roomIdParam];
                    }
                    bingoStorage.setUserInfo(userInfo);
                }

                if (!roomIdParam && !configParam) {
                    const lastSession = bingoStorage.getLastSession();
                    if (lastSession) {
                        if (lastSession.type === "room") {
                            roomIdParam = lastSession.roomId;
                        } else if (lastSession.type === "standalone") {
                            configParam = lastSession.configRaw;
                        }

                        // Update URL with restored parameters
                        const newParams = new URLSearchParams(window.location.search);
                        if (roomIdParam) newParams.set("room", roomIdParam);
                        if (configParam) newParams.set("c", configParam);
                        newParams.set("u", userInfo.id);
                        history.replaceState(null, "", "?" + newParams.toString());
                    }
                }

                if (roomIdParam) {
                    const sanitizedRoomId = bingoCore.sanitizeRoomId(roomIdParam);


                    // Try local storage first
                    myCardData = bingoStorage.loadCard(sanitizedRoomId);

                    // If not found locally OR if we just adopted a new ID and don't have a nickname for this room,
                    // try fetching from sync (restores card and nickname)
                    if (!myCardData || (userIdParam && !userInfo.nickname)) {
                        try {
                            const playerData = await sync.getPlayerData(sanitizedRoomId, userInfo.id);
                            if (playerData) {
                                if (!myCardData) myCardData = playerData.cardData;
                                if (playerData.nickname) {
                                    userInfo.nicknames[sanitizedRoomId] = playerData.nickname;
                                    userInfo.nickname = playerData.nickname;
                                    bingoStorage.setUserInfo(userInfo);
                                }
                            }
                        } catch (e) {
                            console.error("Error fetching player data:", e);
                        }
                    }

                    // If still no card data, generate a new one from room config
                    if (!myCardData) {
                        try {
                            const config = await sync.getRoomConfig(sanitizedRoomId);
                            if (config) {
                                myCardData = bingoCore.generateCardData(config, sanitizedRoomId);
                            } else {
                                if (sanitizedRoomId === "default") {
                                    myCardData = bingoCore.generateCardData(bingoCore.DEFAULT_CONFIG, "default");
                                } else {
                                    alert("This room does not exist or has expired.");
                                    window.location.href = "index.html";
                                    return;
                                }
                            }
                        } catch (e) {
                            console.error("Error fetching room config:", e);
                            if (sanitizedRoomId === "default") {
                                myCardData = bingoCore.generateCardData(bingoCore.DEFAULT_CONFIG, "default");
                            } else {
                                alert("Failed to join room. Returning to home.");
                                window.location.href = "index.html";
                                return;
                            }
                        }
                    }

                    bingoStorage.saveCard(myCardData);
                    renderCard(myCardData);
                    setupMultiplayer();
                } else if (configParam) {
                    isStandalone = true;
                    const config = bingoCore.decodeConfig(window.location.search);

                    // For standalone, we check if we have a saved card for 'standalone'
                    // AND if it matches the current config string to avoid stale cards
                    const savedCard = bingoStorage.loadCard('standalone');
                    if (savedCard && savedCard.configRaw === config.raw) {
                        myCardData = savedCard;
                    } else {
                        myCardData = bingoCore.generateCardData(config, 'standalone');
                        myCardData.configRaw = config.raw;
                        bingoStorage.saveCard(myCardData);
                    }

                    document.querySelector('.multiplayer-footer').style.display = 'none';
                    renderCard(myCardData);
                    setupMultiplayer();
                    bingoStorage.saveLastSession({ type: "standalone", configRaw: config.raw });
                    const url = new URL(window.location.href);
                    if (url.searchParams.get("u") !== userInfo.id) {
                        url.searchParams.set("u", userInfo.id);
                        history.replaceState(null, "", url.search);
                    }
                } else {
                    myCardData = bingoStorage.loadCard('default');
                    if (!myCardData) {
                        myCardData = bingoCore.generateCardData(bingoCore.DEFAULT_CONFIG, 'default');
                        bingoStorage.saveCard(myCardData);
                    }

                    renderCard(myCardData);
                    setupMultiplayer();
                }
            } finally {
                document.getElementById('loading-overlay').classList.remove('visible');
            }
        }
        async function joinRoom() {
            try {
                await sync.joinRoom(myCardData.roomId, userInfo, myCardData, activeNickname);
                activeNickname = userInfo.nickname;
            } catch (err) {
                console.error("Join room failed:", err);
                if (err.message === 'Nickname already taken') {
                    nicknameError.textContent = 'Nickname already taken.';
                    nicknameSubmit.textContent = "Join Room";
                    nicknameModal.showModal();
                    return;
                }
            }
            updateNavigation();
            // Persist session and update URL with user ID
            bingoStorage.saveLastSession({ type: "room", roomId: myCardData.roomId });
            const url = new URL(window.location.href);
            if (url.searchParams.get("u") !== userInfo.id) {
                url.searchParams.set("u", userInfo.id);
                history.replaceState(null, "", url.search);
            }
        }

        nicknameSubmit.addEventListener('click', async () => {
            const nick = nicknameInput.value.trim();
            if (nick) {
                nicknameSubmit.disabled = true;
                try {
                    const isSameName = activeNickname && nick.toLowerCase() === activeNickname.toLowerCase();
                    const available = isSameName || await sync.isNicknameAvailable(myCardData.roomId, nick);

                    if (available) {
                        userInfo.nickname = nick;
                        userInfo.nicknames[myCardData.roomId] = nick;
                        bingoStorage.setUserInfo(userInfo);

                        nicknameModal.close();
                        joinRoom();
                    } else {
                        nicknameError.textContent = 'Nickname already taken.';
                        nicknameSubmit.disabled = false;
                    }
                } catch (err) {
                    console.error("Firebase might not be configured:", err);
                    userInfo.nickname = nick;
                    userInfo.nicknames[myCardData.roomId] = nick;
                    bingoStorage.setUserInfo(userInfo);
                    nicknameModal.close();
                    updateNavigation();
                } finally {
                    nicknameSubmit.disabled = false;
                }
            }
        });

        function updateNavigation() {
            if (isStandalone) return;
            const total = otherPlayers.length + 1;
            const displayIndex = currentIndex === -1 ? 1 : currentIndex + 2;

            if (userInfo.nickname) {
                currentPlayerName.textContent = currentIndex === -1 ? `${userInfo.nickname} (You)` : otherPlayers[currentIndex].nickname;
            } else {
                currentPlayerName.textContent = "Guest";
            }

            currentPlayerName.style.cursor = currentIndex === -1 ? 'pointer' : 'default';

            playerCount.textContent = `Player ${displayIndex} of ${total}`;

            prevBtn.disabled = currentIndex <= -1;
            nextBtn.disabled = currentIndex >= otherPlayers.length - 1;
        }

        let namePressTimer;
        let isNameLongPress = false;
        let nameStartX, nameStartY;

        currentPlayerName.addEventListener('pointerdown', (e) => {
            if (currentIndex !== -1) return;
            isNameLongPress = false;
            nameStartX = e.clientX;
            nameStartY = e.clientY;
            namePressTimer = setTimeout(() => {
                isNameLongPress = true;
                nicknameInput.value = userInfo.nickname;
                nicknameError.textContent = "";
                nicknameSubmit.textContent = "Update";
                nicknameModal.showModal();
            }, 500);
        });
        const cancelNamePress = (e) => {
            if (e.type === "pointermove") {
                if (!nameStartX || !nameStartY) return;
                const dist = Math.hypot(e.clientX - nameStartX, e.clientY - nameStartY);
                if (dist < 10) return;
            }
            clearTimeout(namePressTimer);
        };

        currentPlayerName.addEventListener('pointerup', cancelNamePress);
        currentPlayerName.addEventListener('pointermove', cancelNamePress);
        currentPlayerName.addEventListener('pointercancel', cancelNamePress);
        currentPlayerName.addEventListener('contextmenu', (e) => {
            if (currentIndex === -1) e.preventDefault();
        });

        function openNoteModal(index, isReadOnly = false, data = myCardData) {
            currentSpaceIndex = index;
            const space = data.spaces[index];
            modalTitle.textContent = `Note for "${space.text}"`;
            currentPhotoBase64 = space.photo || "";

            if (currentPhotoBase64) {
                photoPreviewImg.src = currentPhotoBase64;
                photoPreviewContainer.style.display = "flex";
                addPhotoBtn.style.display = "none";
                removePhotoBtn.style.display = isReadOnly ? "none" : "flex";
            } else {
                photoPreviewImg.src = "";
                photoPreviewContainer.style.display = "none";
                addPhotoBtn.style.display = isReadOnly ? "none" : "block";
            }

            noteTextarea.value = space.note || "";
            noteTextarea.readOnly = isReadOnly;
            saveNoteBtn.style.display = isReadOnly ? "none" : "inline-block";

            noteModal.showModal();
        }

        addPhotoBtn.addEventListener("click", () => {
            notePhotoInput.click();
        });

        notePhotoInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentPhotoBase64 = event.target.result;
                    photoPreviewImg.src = currentPhotoBase64;
                    photoPreviewContainer.style.display = "flex";
                    addPhotoBtn.style.display = "none";
                };
                reader.readAsDataURL(file);
            }
        });

        removePhotoBtn.addEventListener("click", () => {
            currentPhotoBase64 = "";
            photoPreviewImg.src = "";
            photoPreviewContainer.style.display = "none";
            addPhotoBtn.style.display = "block";
            notePhotoInput.value = "";
        });


        saveNoteBtn.addEventListener('click', () => {
            if (currentSpaceIndex !== -1) {
                myCardData.spaces[currentSpaceIndex].note = noteTextarea.value;
                myCardData.spaces[currentSpaceIndex].photo = currentPhotoBase64;
                bingoStorage.saveCard(myCardData);
                if (!isStandalone) {
                    sync.updateCard(myCardData.roomId, userInfo.id, myCardData);
                }
                noteModal.close();
            }
        });
        closeModalBtn.addEventListener('click', () => {
            noteModal.close();
        });

        photoPreviewImg.addEventListener("click", () => {
            if (currentPhotoBase64) {
                fullscreenPhotoImg.src = currentPhotoBase64;
                photoFullscreenModal.showModal();
            }
        });

        photoFullscreenModal.addEventListener("click", () => {
            photoFullscreenModal.close();
        });


        function renderCard(data, isReadOnly = false) {
            titleElement.textContent = data.title;
            document.body.className = `standalone-body font-${data.fontSize || 'm'}`;
            document.body.dataset.theme = data.theme || 'classic';
            document.body.dataset.font = data.fontFamily || 'sans';
            gridElement.style.gridTemplateColumns = `repeat(${data.width}, 1fr)`;
            gridElement.style.gridTemplateRows = `repeat(${data.height}, 1fr)`;
            gridElement.innerHTML = '';

            data.spaces.forEach((space, index) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell' + (space.marked ? ' marked' : '') + (isReadOnly ? ' readonly' : '');
                const text = document.createElement('div');
                text.textContent = space.text;
                cell.appendChild(text);

                if (space.subheading) {
                    const sub = document.createElement('div');
                    sub.className = 'freespace-label';
                    sub.textContent = space.subheading;
                    cell.appendChild(sub);
                }
                let pressTimer;
                let isLongPress = false;
                let startX, startY;

                const startPress = (e) => {
                    isLongPress = false;
                    startX = e.clientX;
                    startY = e.clientY;
                    if (data.enableNotes && !space.isFreeSpace) {
                        pressTimer = setTimeout(() => {
                            isLongPress = true;
                            openNoteModal(index, isReadOnly, data);
                        }, 500);
                    }
                };

                const cancelPress = (e) => {
                    if (e.type === "pointermove") {
                        if (!startX || !startY) return;
                        const dist = Math.hypot(e.clientX - startX, e.clientY - startY);
                        if (dist < 10) return;
                    }
                    clearTimeout(pressTimer);
                };

                cell.addEventListener("pointerdown", startPress);
                cell.addEventListener("pointerup", cancelPress);
                cell.addEventListener("pointermove", cancelPress);
                cell.addEventListener("pointercancel", cancelPress);

                cell.addEventListener("click", () => {
                    if (isLongPress) return;
                    if (isReadOnly) {
                        showToast("You cannot mark other players boards!");
                        return;
                    }
                    const wasMarked = space.marked;
                    space.marked = !wasMarked;
                    cell.classList.toggle("marked");

                    if (!wasMarked) {
                        if (data.enableNotes && !space.isFreeSpace) {
                            space.wasEverDaubed = true;
                            openNoteModal(index);
                        }
                        space.wasEverDaubed = true;
                    }

                    bingoStorage.saveCard(myCardData);
                    if (!isStandalone) {
                        sync.updateCard(myCardData.roomId, userInfo.id, myCardData);
                    }
                });
                cell.addEventListener("contextmenu", (e) => e.preventDefault());
                gridElement.appendChild(cell);
            });
            updateNavigation();
        }

        async function switchPlayer(newIndex) {
            const isNext = newIndex > currentIndex;
            const slideOutClass = isNext ? 'slide-left' : 'slide-right';
            const slideInClass = isNext ? 'slide-right' : 'slide-left';

            gridElement.style.transition = 'all 0.3s ease';
            gridElement.classList.add(slideOutClass);

            setTimeout(() => {
                currentIndex = newIndex;
                const data = currentIndex === -1 ? myCardData : otherPlayers[currentIndex].cardData;
                renderCard(data, currentIndex !== -1);

                gridElement.style.transition = 'none';
                gridElement.classList.remove(slideOutClass);
                gridElement.classList.add(slideInClass);

                gridElement.offsetHeight;

                gridElement.style.transition = 'all 0.3s ease';
                gridElement.classList.remove(slideInClass);
            }, 300);
        }


        prevBtn.addEventListener('click', () => {
            if (currentIndex > -1) switchPlayer(currentIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < otherPlayers.length - 1) switchPlayer(currentIndex + 1);
        });
        helpBtn.addEventListener("click", () => helpModal.showModal());
        closeHelpBtn.addEventListener("click", () => helpModal.close());
        init();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
