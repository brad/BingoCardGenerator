<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Card Generator</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/icon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Bingo Card Generator</h1>
    <form id="generator-form">
        <fieldset>
            <legend>Bingo Card Basics</legend>
            <label>Card Title <input type="text" name="title" id="title" value="Day in the Park Bingo"></label>
            <label>Word List (separated by commas)
                <textarea cols="60" rows="8" name="words" id="id-words">Flowers,Bees,Picnickers,Ants,Little Kid Crying,Holding Hands,Person Napping,A Balloon,Dogs,Frisbee,Stroller,Chess Players,Rollerskates,Musician,Juggler,Photographer,Painter,Plastic Bag in Tree,Squirrel,Pigeon,Bicycle Built for Two,Ice Cream,Sunbather,Person Reading Newspaper,Person Listening to Radio,Sidewalk Chalk,Hopscotch</textarea>
            </label>
            <label>Font Size
                <select name="fontSize" id="fontSize">
                    <option value="s">Small</option>
                    <option value="m" selected>Medium</option>
                    <option value="l">Large</option>
                </select>
            </label>
            <label class="checkbox-label">
                <input type="checkbox" name="enableNotes" id="enableNotes"> Enable taking notes for each square
            </label>
        </fieldset>

        <fieldset>
            <legend>Center Space</legend>
            <label>Center Space Type
                <select name="centerType" id="centerType">
                    <option value="f" selected>Free Space (Pre-marked)</option>
                    <option value="m">Manual (Fixed text, not marked)</option>
                    <option value="r">Randomized (From word list)</option>
                </select>
            </label>
            <div id="center-manual-options">
                <label>Center Space Text <input type="text" name="centerValue" id="centerValue" value="Park Bench"></label>
                <label>Center Space Description <input type="text" name="centerSubheadingValue" id="centerSubheadingValue" value="Free Space"></label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Card Size</legend>
            <label>Grid Size (Square)
                <select name="gridSize" id="gridSize">
                    <option value="3">3x3</option>
                    <option value="5" selected>5x5</option>
                    <option value="7">7x7</option>
                </select>
            </label>
        </fieldset>

        <div class="button-group">
            <button type="button" id="generate-local">Open standalone card</button>
            <button type="button" id="generate-link">Copy shareable link</button>
        </div>
    </form>

    <div id="link-display" style="display:none; margin-top: 10px; padding: 10px; background: #eef; border-radius: 4px; word-break: break-all;">
        <strong>Shareable Link:</strong><br>
        <span id="link-text"></span>
    </div>

    <script type="module">
        import { bingoCore } from './js/bingo-core.js';
        import { storage } from './js/storage.js';
        import { sync } from './js/sync.js';

        const form = document.getElementById('generator-form');
        const centerType = document.getElementById('centerType');
        const centerManualOptions = document.getElementById('center-manual-options');

        centerType.addEventListener('change', () => {
            if (centerType.value === 'r') {
                centerManualOptions.style.display = 'none';
            } else {
                centerManualOptions.style.display = 'block';
            }
        });

        function getConfig() {
            const formData = new FormData(form);
            const size = parseInt(formData.get('gridSize'));
            return {
                title: formData.get('title'),
                words: document.getElementById('id-words').value,
                width: size,
                height: size,
                centerType: formData.get('centerType'),
                centerValue: formData.get('centerValue'),
                centerSubheadingValue: formData.get('centerSubheadingValue'),
                fontSize: formData.get('fontSize'),
                enableNotes: formData.get('enableNotes') === 'on'
            };
        }

        document.getElementById('generate-local').addEventListener('click', () => {
            const config = getConfig();
            const queryString = bingoCore.encodeConfig(config);
            window.location.href = 'card.html?' + queryString;
        });

        document.getElementById('generate-link').addEventListener('click', async () => {
            const config = getConfig();
            const roomId = bingoCore.generateRoomId();

            try {
                await sync.saveRoomConfig(roomId, config);
                const baseUrl = window.location.href.split('index.html')[0].split('?')[0].replace(/\/$/, '');
                const url = baseUrl + '/card.html?room=' + roomId;

                const linkDisplay = document.getElementById('link-display');
                const linkText = document.getElementById('link-text');
                linkText.textContent = url;
                linkDisplay.style.display = 'block';

                navigator.clipboard.writeText(url).then(() => {
                    alert('Link copied to clipboard!');
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                });
            } catch (err) {
                console.error('Failed to save room config: ', err);
                alert('Failed to generate link. Please try again.');
            }
        });
    </script>
</body>
</html>
